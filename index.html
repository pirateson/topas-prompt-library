      }

    }

    .stagger-1 {
      animation-delay: 0.1s;

    .stagger-2 {

    }

    .stagger-3 {

        // --- API ---
        const api = {
          async getMarkets() {
            const { data, error } = await supabase.from('markets').select('*').order('name');
            return data || [];
          },
          async getCurrentUser() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) return null;
            const { data: userRecord } = await supabase.from('users').select('*').eq('id', session.user.id).single();
            return { ...session.user, ...userRecord };
          },
          async ensureMarketAccess(userId, marketId) {
            if (!marketId) return;
            const { data } = await supabase.from('user_market_roles').select('role').eq('user_id', userId).eq('market_id', marketId).maybeSingle();
            if (!data) await supabase.from('user_market_roles').insert({ user_id: userId, market_id: marketId, role: 'view' });
          },
          async getTopics(marketId) {
            const { data } = await supabase.from('topics').select('*').eq('market_id', marketId).order('name');
            return data || [];
          },
          async getPrompts(marketId, topicId, searchQuery = '') {
            const { data } = await supabase.rpc('search_prompts', { p_market_id: marketId, p_topic_id: topicId, p_search_text: searchQuery || null });
            return data || [];
          },
          async savePrompt(d) {
            const payload = {
              topic_id: d.topic_id,
              title: d.title,
              content: d.content
            };
            const { data, error } = d.id
              ? await supabase.from('prompts').update(payload).eq('id', d.id).select().single()
              : await supabase.from('prompts').insert(payload).select().single();
            if (error) throw error;
            return data;
          },
          async deletePrompt(id) { await supabase.from('prompts').delete().eq('id', id); },
          async getPromptVersions(id) {
            const { data } = await supabase.from('prompt_versions').select('version, content, created_at').eq('prompt_id', id).order('version', { ascending: false });
            return data || [];
          },
          async getUsers() {
            const { data } = await supabase.from('users').select('*').order('created_at', { ascending: false });
            return data || [];
          },
          async deleteUser(userId) {
            const res = await fetch(
              "https://yhrxfnjpgurchgzvjtqw.supabase.co/functions/v1/delete-user",
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
                },
                body: JSON.stringify({ userId })
              }
            )

            const data = await res.json()
            if (!res.ok) throw new Error(data.error || 'Failed to delete user')
            return data
          }
        };

        // --- Router / Init ---
        async function init() {
          try {
            state.markets = await api.getMarkets();
            const { data: { session } } = await supabase.auth.getSession();
            if (session) await handleLogin(session.user);
            else { state.view = 'landing'; render(); }
          } catch (e) { state.view = 'landing'; render(); }

          supabase.auth.onAuthStateChange(async (event, session) => {
            if (session && !state.user) await handleLogin(session.user);
            else if (!session && state.user) { state.user = null; state.view = 'landing'; render(); }
          });
        }

        async function handleLogin(authUser) {
          state.view = 'loading'; render();
          try {
            const user = await api.getCurrentUser();
            if (!user) { state.view = 'landing'; render(); return; }
            state.user = user;
            state.isSuperAdmin = user.is_super_admin;

            const { data: roles } = await supabase.from('user_market_roles').select('*').eq('user_id', user.id);
            state.userRoles = roles || [];

            if (!state.isSuperAdmin) {
              const allowedids = state.userRoles.map(r => r.market_id);
              state.markets = state.markets.filter(m => allowedids.includes(m.id));
            }
            if (!state.selectedMarketId && state.markets.length > 0) state.selectedMarketId = state.markets[0].id;

            state.view = 'app';
            state.users = await api.getUsers();
            await loadMarketData();

            // Notify Lark if this is the first login
            const notifyKey = `notified_lark_${user.id}`;
            if (!localStorage.getItem(notifyKey)) {
              await notifyLarkNewUser(user);
              localStorage.setItem(notifyKey, 'true');
            }
          } catch (e) { console.error(e); state.view = 'landing'; render(); }
        }

        async function notifyLarkNewUser(user) {
          try {
            await supabase.functions.invoke('lark-notify', {
              body: { user }
            });
          } catch (e) { console.error("Lark notify failed:", e); }
        }

        async function loadMarketData() {
          if (!state.selectedMarketId) { render(); return; }
          const r = state.userRoles.find(r => r.market_id === state.selectedMarketId);
          state.currentRole = state.isSuperAdmin ? 'superadmin' : (r ? r.role : 'view');

          state.topics = await api.getTopics(state.selectedMarketId);
          state.selectedTopicId = null;
          state.isAddingPromptInline = false;
          state.isCreatingTopic = false;
          state.newTopicName = '';
          await loadPromptsData();
        }

        async function loadPromptsData() {
          let data = await api.getPrompts(state.selectedMarketId, state.selectedTopicId, state.searchQuery);

          // Client-side sorting
          if (state.sortBy === 'az') data.sort((a, b) => a.title.localeCompare(b.title));
          else if (state.sortBy === 'za') data.sort((a, b) => b.title.localeCompare(a.title));
          else if (state.sortBy === 'newest') data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
          else if (state.sortBy === 'oldest') data.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

          state.prompts = data;
          render();
        }

        // --- Render Engine ---
        function render() {
          if (state.view !== appDiv.dataset.view) {
            appDiv.innerHTML = '';
            appDiv.dataset.view = state.view;
            if (state.view === 'loading') appDiv.innerHTML = renderLoading();
            else if (state.view === 'landing') appDiv.appendChild(renderLanding());
            else if (state.view === 'app') appDiv.appendChild(renderMainAppSkeleton());
            else if (state.view === 'admin') appDiv.appendChild(renderAdminPanel());
          }

        const utils = {
          createElement(h) { const d = document.createElement('div'); d.innerHTML = h.trim(); return d.firstChild; },
          async withLoading(btn, fn) {
            if (!btn) return fn();
            const orig = btn.innerHTML;
            const origDis = btn.disabled;
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="h-4 w-4 animate-spin mx-auto text-current"></i>`;
            if (window.lucide) window.lucide.createIcons();
            try { await fn(); } finally { btn.disabled = origDis; btn.innerHTML = orig; if (window.lucide) window.lucide.createIcons(); }
          },
          async confirm(message) {
            return new Promise((resolve) => {
              const modal = document.getElementById('custom-confirm-modal');
              const msgEl = document.getElementById('confirm-message');
              const okBtn = document.getElementById('confirm-ok');
              const cancelBtn = document.getElementById('confirm-cancel');

              msgEl.textContent = message;
              modal.style.display = 'flex';
              if (window.lucide) window.lucide.createIcons();

              const cleanup = (val) => {
                modal.style.display = 'none';
                okBtn.onclick = null;
                cancelBtn.onclick = null;
                resolve(val);
              };

              okBtn.onclick = () => cleanup(true);
              cancelBtn.onclick = () => cleanup(false);
            });
          }
        };

        function startInlineEdit(cell, item, field, table = 'prompts') {
          if (cell.querySelector('.inline-edit-el')) return;
          const originalValue = item[field] || '';
          cell.innerHTML = '';
          cell.classList.add('relative');

          const input = (field === 'content' && table === 'prompts') ? document.createElement('textarea') : document.createElement('input');
          input.className = 'inline-edit-el w-full bg-white border-2 border-brand-orange/40 rounded-xl px-3 py-2 text-sm font-bold outline-none focus:ring-4 focus:ring-brand-orange/5 transition-all';
          if (input.tagName === 'TEXTAREA') input.rows = 4;
          input.value = originalValue;

          const controls = document.createElement('div');
          controls.className = 'absolute right-2 bottom-2 flex gap-1 z-20';
          controls.innerHTML = `
            <button class="btn-inline-save bg-brand-orange text-white p-1 rounded-lg shadow-lg hover:shadow-orange-500/20 transition-all"><i data-lucide="check" class="h-3 w-3"></i></button>
            <button class="btn-inline-cancel bg-white border border-slate-200 text-slate-400 p-1 rounded-lg shadow-lg hover:bg-slate-50 transition-all"><i data-lucide="x" class="h-3 w-3"></i></button>
          `;

          cell.appendChild(input);
          cell.appendChild(controls);
          if (window.lucide) window.lucide.createIcons();
          input.focus();

          const save = async () => {
            const newValue = input.value.trim();
            if (newValue !== originalValue) {
              await utils.withLoading(null, async () => {
                if (table === 'prompts') {
                  const updated = { ...item, [field]: newValue };
                  await api.savePrompt(updated);
                  await loadPromptsData();
                } else if (table === 'topics') {
                  await supabase.from('topics').update({ [field]: newValue }).eq('id', item.id);
                  await loadMarketData();
                }
              });
            } else {
              cell.textContent = originalValue;
            }
          };

          const cancel = () => {
            cell.textContent = originalValue;
          };

          controls.querySelector('.btn-inline-save').onclick = (e) => { e.stopPropagation(); save(); };
          controls.querySelector('.btn-inline-cancel').onclick = (e) => { e.stopPropagation(); cancel(); };

          input.onkeydown = (e) => {
            if (e.key === 'Enter' && input.tagName !== 'TEXTAREA') { e.stopPropagation(); save(); }
            if (e.key === 'Escape') { e.stopPropagation(); cancel(); }
          };

          input.onblur = (e) => {
            // Delay to allow clicking buttons
            setTimeout(() => {
              if (document.activeElement !== input && !controls.contains(document.activeElement)) {
                if (input.value.trim() === originalValue) cancel();
              }
            }, 150);
          };
        }

                </button>
                <button class="p-2 text-slate-300 hover:text-red-500 transition-colors" title="${t('deleteProfile')}" onclick="deleteUser('${u.id}')">
                  <i data-lucide="trash-2" class="h-4 w-4"></i>
                </button>
              </div>
            </div>
          `).join('');

          if (window.lucide) window.lucide.createIcons();

          // Attach Form Listeners
          document.querySelectorAll('.form-grant-market-role').forEach(form => {
            form.onsubmit = async (e) => {
              e.preventDefault();
              const marketId = form.dataset.marketId;
              const userId = form.querySelector('select:first-child').value;
              const role = form.querySelector('select:nth-child(2)').value;

              if (!userId) return alert("Please select a user");

              await utils.withLoading(null, async () => {
                const { error } = await supabase.from('user_market_roles').upsert({ user_id: userId, market_id: marketId, role: role }, { onConflict: 'user_id,market_id' });
                if (error) alert(error.message);
                else loadAdminData();
              });
            };
          });

          // Define Global helpers for this view
          window.toggleMarketExpand = (mid) => {
            const idx = state.expandedMarketIds.indexOf(mid);
            if (idx > -1) state.expandedMarketIds.splice(idx, 1);
            else state.expandedMarketIds.push(mid);
            loadAdminData();
          };

          window.deleteMarket = async (mid) => {
            if (await utils.confirm(t('confirmDeleteMarket'))) {
              const { error } = await supabase.from('markets').delete().eq('id', mid);
              if (error) alert(error.message);
              else {
                if (state.selectedMarketId === mid) state.selectedMarketId = null;
                loadAdminData();
              }
            }
          };

          window.revokeAccess = async (rid) => {
            if (await utils.confirm(t('confirmRevokeAccess'))) {
              await supabase.from('user_market_roles').delete().eq('id', rid);
              loadAdminData();
            }
          };

          window.toggleSuperAdmin = async (uid, current) => {
            if (await utils.confirm(current ? t('confirmRemoveAdmin') : t('confirmGrantAdmin'))) {
              await supabase.from('users').update({ is_super_admin: !current }).eq('id', uid);
              loadAdminData();
            }
          };

          window.deleteUser = async (uid) => {
            if (await utils.confirm(t('confirmDeleteUser'))) {
              try { await api.deleteUser(uid); loadAdminData(); } catch (e) { alert(e.message); }
            }
          };
        }

        document.addEventListener('submit', async (e) => {
          if (e.target.id === 'form-add-market') { e.preventDefault(); const { error } = await supabase.from('markets').insert({ name: document.getElementById('input-new-market').value }); if (error) alert(error.message); else { document.getElementById('input-new-market').value = ''; loadAdminData(); } }
        });

        init();
      })();
  </script>
</body>

</html>
